<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>يلا مباريات HD</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--red:#e50914;
--bg:#0a0a0a;
--card:#161616;
--gold:#ffc107;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:var(--bg);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:#000;
border-bottom:2px solid var(--red);
}

.logo{
font-size:1.8rem;
font-weight:bold;
color:var(--red);
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.video-section{
background:black;
border-radius:10px;
overflow:hidden;
position:relative;
}

.video-js{
width:100%!important;
height:500px!important;
}

.channel-info{
background:#111;
padding:12px;
display:flex;
justify-content:space-between;
}

.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:25px;
display:none;
}

.search{
width:100%;
padding:10px;
margin:15px 0;
border:none;
border-radius:6px;
font-family:Cairo;
}

.tabs{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:10px;
}

.tab-btn{
background:#222;
border:none;
color:white;
padding:8px 15px;
cursor:pointer;
border-radius:5px;
}

.tab-btn.active{
background:var(--red);
}

.channels-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:12px;
}

.chan-card{
background:var(--card);
border:1px solid #333;
padding:20px;
text-align:center;
cursor:pointer;
border-radius:10px;
position:relative;
transition:0.3s;
}

.chan-card:hover{
transform:translateY(-5px);
border-color:var(--red);
}

.chan-card i{
font-size:28px;
color:var(--red);
}

.quality{
position:absolute;
top:5px;
right:5px;
background:var(--gold);
color:black;
padding:2px 6px;
font-size:11px;
border-radius:4px;
}

.match-list{
margin-top:30px;
}

.match{
background:#161616;
padding:12px;
margin-bottom:10px;
border-radius:6px;
display:flex;
justify-content:space-around;
}

@media(max-width:768px){

.video-js{
height:250px!important;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
يلا مباريات HD
</div>

<div>بث مباشر بدون تقطيع</div>

</header>


<div class="container">

<div class="video-section">

<div class="channel-info">

<span id="playing-name">
اختر قناة
</span>

<span style="color:#4CAF50">
متصل
</span>

</div>

<video id="player" class="video-js vjs-big-play-centered" controls preload="auto"
poster="https://img.freepik.com/free-photo/soccer-players-action-on-professional-stadium_1150-14442.jpg">

<source src="https://live-hls-web-ara.aljazeera.net/ar/apple/master.m3u8" type="application/x-mpegURL">

</video>

<div class="loader">
<i class="fas fa-spinner fa-spin"></i>
</div>

</div>


<input id="search" class="search" placeholder="ابحث عن قناة">


<div class="tabs">

<button class="tab-btn active" onclick="filterChannels('all')">الكل</button>
<button class="tab-btn" onclick="filterChannels('bein')">beIN</button>
<button class="tab-btn" onclick="filterChannels('ssc')">SSC</button>
<button class="tab-btn" onclick="filterChannels('news')">اخبار</button>

</div>


<div class="channels-grid" id="channels"></div>


<div class="match-list">

<h3>مباريات اليوم</h3>

<div class="match">

<span>ريال مدريد</span>

<span style="color:red">VS</span>

<span>ميلان</span>

<span>10:00 م</span>

</div>

<div class="match">

<span>برشلونة</span>

<span style="color:red">VS</span>

<span>ليفربول</span>

<span>11:30 م</span>

</div>

</div>

</div>


<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

const player = videojs('player');

const channels = [

{
name:"beIN Sports 1",
url:"ضع_رابط",
category:"bein",
quality:"HD",
icon:"fa-futbol"
},

{
name:"beIN Sports 2",
url:"ضع_رابط",
category:"bein",
quality:"HD",
icon:"fa-futbol"
},

{
name:"SSC Sport 1",
url:"ضع_رابط",
category:"ssc",
quality:"FHD",
icon:"fa-trophy"
},

{
name:"الجزيرة مباشر",
url:"https://live-hls-web-ara.aljazeera.net/ar/apple/master.m3u8",
category:"news",
quality:"SD",
icon:"fa-broadcast-tower"
}

];

function loadChannels(list){

const container=document.getElementById("channels");

container.innerHTML="";

list.forEach(c=>{

container.innerHTML+=`

<div class="chan-card" onclick="playChannel('${c.name}','${c.url}')">

<div class="quality">${c.quality}</div>

<i class="fas ${c.icon}"></i>

<div>${c.name}</div>

</div>

`;

});

}

loadChannels(channels);


function playChannel(name,url){

if(url.includes("ضع_رابط")){

alert("ضع رابط m3u8");

return;

}

player.src({

src:url,
type:"application/x-mpegURL"

});

player.play();

document.getElementById("playing-name").innerHTML="تشاهد الآن: "+name;

}


function filterChannels(cat){

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

event.target.classList.add("active");

if(cat==="all"){

loadChannels(channels);

return;

}

let filtered=channels.filter(c=>c.category===cat);

loadChannels(filtered);

}



document.getElementById("search").addEventListener("input",function(){

let v=this.value.toLowerCase();

let filtered=channels.filter(c=>c.name.toLowerCase().includes(v));

loadChannels(filtered);

});


player.on("waiting",function(){

document.querySelector(".loader").style.display="block";

});

player.on("playing",function(){

document.querySelector(".loader").style.display="none";

});

</script>

</body>
    </html>
