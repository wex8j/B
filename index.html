<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>يلا مباريات HD</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Cairo;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
border-bottom:3px solid red;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.video-js{
width:100%!important;
height:500px!important;
}

.search{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:15px;
font-family:Cairo;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
margin-top:20px;
}

.channel{
background:#161616;
padding:15px;
border-radius:8px;
cursor:pointer;
text-align:center;
transition:0.3s;
}

.channel:hover{
background:#222;
}

@media(max-width:768px){

.video-js{
height:250px!important;
}

}

</style>

</head>

<body>

<header>
يلا مباريات HD
</header>

<div class="container">

<video
id="player"
class="video-js"
controls
preload="auto"
></video>

<input id="search" class="search" placeholder="ابحث عن قناة">

<div id="channels" class="channels"></div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

const player = videojs('player');

const m3uUrl = "https://iptv-org.github.io/iptv/index.m3u";

let channels = [];

fetch(m3uUrl)
.then(res => res.text())
.then(data => {

const lines = data.split("\n");

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name = lines[i].split(",")[1];

let url = lines[i+1];

channels.push({
name:name,
url:url
});

}

}

showChannels(channels.slice(0,200));

});


function showChannels(list){

const container=document.getElementById("channels");

container.innerHTML="";

list.forEach(ch=>{

const div=document.createElement("div");

div.className="channel";

div.innerText=ch.name;

div.onclick=function(){

player.src({
src:ch.url,
type:"application/x-mpegURL"
});

player.play();

};

container.appendChild(div);

});

}


document.getElementById("search").addEventListener("input",function(){

let val=this.value.toLowerCase();

let filtered=channels.filter(c=>c.name.toLowerCase().includes(val));

showChannels(filtered.slice(0,200));

});

</script>

</body>

</html>
