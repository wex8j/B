<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة البث المباشر</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Cairo;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
border-bottom:2px solid red;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.video-js{
width:100%!important;
height:500px!important;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;
margin-top:20px;
}

.channel{
background:#161616;
padding:15px;
border-radius:8px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.channel:hover{
background:#222;
}

.search{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:6px;
font-family:Cairo;
}

@media(max-width:768px){

.video-js{
height:250px!important;
}

}

</style>

</head>

<body>

<header>
منصة البث المباشر
</header>

<div class="container">

<video
id="player"
class="video-js"
controls
preload="auto"
poster="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e"
>

<source src="https://live-hls-web-ara.aljazeera.net/ar/apple/master.m3u8" type="application/x-mpegURL">

</video>

<input id="search" class="search" placeholder="ابحث عن قناة">

<div class="channels" id="channels"></div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

const player = videojs('player');

const channels=[

{
name:"Al Jazeera",
url:"https://live-hls-web-ara.aljazeera.net/ar/apple/master.m3u8"
},

{
name:"NASA TV",
url:"https://ntv1.ntvstreaming.com/ntv1/playlist.m3u8"
},

{
name:"Sky News",
url:"https://skynewsau-live.akamaized.net/hls/live/2002689/skynewsau-extra1/master.m3u8"
},

{
name:"Bloomberg TV",
url:"https://bloomberg-bloomberg-1-eu.rakuten.wurl.tv/playlist.m3u8"
},

{
name:"DW News",
url:"https://dwamdstream102.akamaized.net/hls/live/2015525/dwstream102/index.m3u8"
},

{
name:"France 24",
url:"https://static.france24.com/live/F24_EN_LO_HLS/live_web.m3u8"
}

];


function showChannels(list){

const container=document.getElementById("channels");

container.innerHTML="";

list.forEach(ch=>{

const div=document.createElement("div");

div.className="channel";

div.innerText=ch.name;

div.onclick=function(){

player.src({
src:ch.url,
type:"application/x-mpegURL"
});

player.play();

};

container.appendChild(div);

});

}

showChannels(channels);


document.getElementById("search").addEventListener("input",function(){

let value=this.value.toLowerCase();

let filtered=channels.filter(c=>c.name.toLowerCase().includes(value));

showChannels(filtered);

});

</script>

</body>

</html>
