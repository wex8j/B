<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ يلا مباريات HD</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Cairo;
background:#0a0a0a;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
border-bottom:3px solid red;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.video-js{
width:100%!important;
height:480px!important;
}

.search{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:15px;
font-family:Cairo;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:12px;
margin-top:20px;
}

.channel{
background:#161616;
padding:15px;
border-radius:8px;
cursor:pointer;
text-align:center;
transition:0.3s;
}

.channel:hover{
background:#222;
transform:scale(1.05);
}

.live{
background:red;
padding:3px 8px;
border-radius:5px;
font-size:12px;
margin-top:5px;
display:inline-block;
}

@media(max-width:768px){
.video-js{
height:250px!important;
}
}

</style>

</head>

<body>

<header>
⚽ يلا مباريات HD
</header>

<div class="container">

<video
id="player"
class="video-js"
controls
preload="auto"
poster="https://images.unsplash.com/photo-1508098682722-e99c43a406b2"
></video>

<input id="search" class="search" placeholder="ابحث عن قناة رياضية">

<div id="channels" class="channels"></div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

const player = videojs('player');

const channels=[

{
name:"Abu Dhabi Sports",
url:"https://admdn2.cdn.mangomolo.com/adtv/smil:adsports1.smil/playlist.m3u8"
},

{
name:"Al Kass Sports",
url:"https://alkasslive-lh.akamaihd.net/i/alkasslive_1@122526/master.m3u8"
},

{
name:"Kuwait Sports",
url:"https://kwtslivehls-lh.akamaihd.net/i/kwtslivehls_1@567161/master.m3u8"
},

{
name:"Oman Sports",
url:"https://partneta.cdn.mangomolo.com/omsport/smil:omsport.stream.smil/playlist.m3u8"
},

{
name:"Bahrain Sports",
url:"https://5c7b683162943.streamlock.net/live/ngrp:bahrainsports_all/playlist.m3u8"
},

{
name:"Sharjah Sports",
url:"https://svs.itworkscdn.net/smc4sportslive/smc4.smil/playlist.m3u8"
}

];


function showChannels(list){

const container=document.getElementById("channels");

container.innerHTML="";

list.forEach(ch=>{

const div=document.createElement("div");

div.className="channel";

div.innerHTML=`

⚽ ${ch.name}
<br>
<span class="live">LIVE</span>

`;

div.onclick=function(){

player.src({

src:ch.url,
type:"application/x-mpegURL"

});

player.play();

};

container.appendChild(div);

});

}

showChannels(channels);


document.getElementById("search").addEventListener("input",function(){

let val=this.value.toLowerCase();

let filtered=channels.filter(c=>c.name.toLowerCase().includes(val));

showChannels(filtered);

});

</script>

</body>

</html>
