<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ يلا مباريات HD</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Cairo;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:28px;
border-bottom:3px solid red;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.video-js{
width:100%!important;
height:450px!important;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
margin-top:20px;
}

.channel{
background:#161616;
padding:15px;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.channel:hover{
background:#222;
}

.live{
background:red;
padding:3px 7px;
font-size:12px;
border-radius:4px;
margin-top:6px;
display:inline-block;
}

</style>

</head>

<body>

<header>
⚽ يلا مباريات HD
</header>

<div class="container">

<video id="player" class="video-js" controls></video>

<div id="channels" class="channels"></div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

const player = videojs('player');

const channels=[

{name:"العراقية",url:"https://www.youtube.com/embed/live_stream?channel=UCdFv0e2g6h5VqVaki3P6KyA"},
{name:"العراقية الرياضية",url:"https://www.youtube.com/embed/live_stream?channel=UCYFqR2raXIiQunlslqY5T2A"},
{name:"UTV",url:"https://www.youtube.com/embed/live_stream?channel=UCvK0M6D0oZX6mE6xPD58LlQ"},
{name:"الشرقية",url:"https://www.youtube.com/embed/live_stream?channel=UCk2u0uS9KuX3sI5Yucs5cjQ"},
{name:"الشرقية نيوز",url:"https://www.youtube.com/embed/live_stream?channel=UCtvvZ1tcHTfb3e8DqRL3OZw"},
{name:"دجلة",url:"https://www.youtube.com/embed/live_stream?channel=UCVZ0uKbjDg-p09WXBJgp7ow"},
{name:"السومرية",url:"https://www.youtube.com/embed/live_stream?channel=UC0sC1kYyqS-gtnznuaCG2qQ"},
{name:"الرشيد",url:"https://www.youtube.com/embed/live_stream?channel=UCyqCCpt5TRTFJPjNenE2noA"},
{name:"الفرات",url:"https://www.youtube.com/embed/live_stream?channel=UCn5Vf3L7hIwrKyYVJZZzK9w"},
{name:"الرابعة",url:"https://www.youtube.com/embed/live_stream?channel=UC4U0Q3N8ignv4Y88MtXgFpA"},
{name:"الاتجاه",url:"https://www.youtube.com/embed/live_stream?channel=UCt4bmPqhGV8eK3opgDdGztA"},
{name:"العهد",url:"https://www.youtube.com/embed/live_stream?channel=UCcHGNy8JD7BqXc9Ejo4kKDg"},
{name:"النجباء",url:"https://www.youtube.com/embed/live_stream?channel=UCm6yOD87mpy4VbQJu1WDVYQ"},
{name:"بلادي",url:"https://www.youtube.com/embed/live_stream?channel=UCv8YgnPZXoqBYwygJyI072A"},
{name:"بغداد",url:"https://www.youtube.com/embed/live_stream?channel=UC0B4ezgmO6ijLJrVN6a8GNw"},
{name:"تركمانلي",url:"https://www.youtube.com/embed/live_stream?channel=UC6uHgnbZQzQpimeISFRCGDQ"},
{name:"كردستان",url:"https://www.youtube.com/embed/live_stream?channel=UC4Y0NVnJyoSgGJE0E7E5WUw"},
{name:"كردستان24",url:"https://www.youtube.com/embed/live_stream?channel=UCcHd9qYapqYh6gMPkTFogyA"},
{name:"روداو",url:"https://www.youtube.com/embed/live_stream?channel=UCN7u0mGz0PqSxkbZVqhlVSA"},
{name:"NRT",url:"https://www.youtube.com/embed/live_stream?channel=UC8N1sC3yRyvE4s46HoPazTA"}

];

function showChannels(){

const container=document.getElementById("channels");

channels.forEach(ch=>{

let div=document.createElement("div");

div.className="channel";

div.innerHTML=`
${ch.name}
<br>
<span class="live">LIVE</span>
`;

div.onclick=function(){

player.src({
src:ch.url,
type:"video/youtube"
});

window.open(ch.url,"_blank");

};

container.appendChild(div);

});

}

showChannels();

</script>

</body>

</html>
