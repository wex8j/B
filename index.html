<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ يلا مباريات HD</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Cairo;
background:#0a0a0a;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:26px;
border-bottom:3px solid red;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.video-js{
width:100%!important;
height:450px!important;
}

.search{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:15px;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:12px;
margin-top:20px;
}

.channel{
background:#161616;
padding:15px;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.channel:hover{
background:#222;
}

.live{
background:red;
padding:3px 8px;
border-radius:5px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

@media(max-width:768px){
.video-js{
height:250px!important;
}
}

</style>

</head>

<body>

<header>
⚽ يلا مباريات HD
</header>

<div class="container">

<video id="player" class="video-js" controls></video>

<input id="search" class="search" placeholder="ابحث عن قناة">

<div id="channels" class="channels"></div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

const player = videojs('player');

const channels=[

{ name:"⚽ العراقية الرياضية", url:"https://cdn.iqstv.net/hls/iraqia_sport.m3u8" },

{ name:"🇮🇶 العراقية", url:"https://cdn.iqstv.net/hls/aliraqia.m3u8" },

{ name:"🇮🇶 MBC العراق", url:"https://shls-mbciraq-prod-dub.shahid.net/out/v1/mbciraq.m3u8" },

{ name:"🇮🇶 الشرقية", url:"https://shls-live-enc.edgenextcdn.net/out/v1/04c3e2cfdcbf4b33b84f4f5d3c3c7d9e/index.m3u8" },

{ name:"🇮🇶 الشرقية نيوز", url:"https://shls-live-enc.edgenextcdn.net/out/v1/1d44a3f0e2e64e68a2d66a6c6d47c2de/index.m3u8" },

{ name:"🇮🇶 دجلة", url:"https://ghaasiflu.online/Dijlah/index.m3u8" },

{ name:"🇮🇶 UTV", url:"https://live.utv.iq/hls/utv.m3u8" },

{ name:"🇮🇶 الرشيد", url:"https://media1.livaat.com/ALRasheed/index.m3u8" },

{ name:"🇮🇶 السومرية", url:"https://live.alsumaria.tv/hls/alsumaria.m3u8" },

{ name:"🇮🇶 الفرات", url:"https://live.alforatnews.com/hls/alforat.m3u8" }

];

function showChannels(list){

const container=document.getElementById("channels");

container.innerHTML="";

list.forEach(ch=>{

const div=document.createElement("div");

div.className="channel";

div.innerHTML=`

${ch.name}
<br>
<span class="live">LIVE</span>

`;

div.onclick=function(){

player.src({
src:ch.url,
type:"application/x-mpegURL"
});

player.play();

};

container.appendChild(div);

});

}

showChannels(channels);

document.getElementById("search").addEventListener("input",function(){

let val=this.value.toLowerCase();

let filtered=channels.filter(c=>c.name.toLowerCase().includes(val));

showChannels(filtered);

});

</script>

</body>

</html>
