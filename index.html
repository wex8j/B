<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يلا مباريات HD - البث المباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0b0b; color: #fff; margin: 0; }
        header { background: #e50914; padding: 15px; text-align: center; font-size: 1.8rem; font-weight: bold; }
        .container { max-width: 900px; margin: 20px auto; padding: 10px; }
        
        /* تصميم المشغل */
        .video-box { background: #000; border-radius: 10px; overflow: hidden; border: 2px solid #222; margin-bottom: 20px; position: relative; }
        .video-js { width: 100% !important; height: 450px !important; }

        /* أزرار القنوات */
        .channels-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 20px; }
        .chan-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; 
            border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; font-weight: bold;
        }
        .chan-btn:hover { background: #e50914; color: #fff; transform: translateY(-3px); }
        .active-chan { background: #e50914; border-color: #fff; }

        .status { padding: 10px; background: #1e1e1e; border-radius: 5px; margin-bottom: 10px; font-size: 0.9rem; color: #ccc; }
        @media (max-width: 600px) { .video-js { height: 250px !important; } }
    </style>
</head>
<body>

<header>YALLA MATCH HD | يلا مباريات</header>

<div class="container">
    <div class="status" id="current-status">جاري التشغيل: قناة الجزيرة (تجريبية)</div>
    
    <div class="video-box">
        <video id="main-player" class="video-js vjs-big-play-centered" controls preload="auto" width="900">
            <source id="video-source" src="https://live-hls-web-ara.aljazeera.net/ar/apple/master.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <h3 style="border-right: 4px solid #e50914; padding-right: 10px;">اختر القناة للمشاهدة:</h3>
    
    <div class="channels-list">
        <div class="chan-btn active-chan" onclick="changeSource('الجزيرة الإخبارية', 'https://live-hls-web-ara.aljazeera.net/ar/apple/master.m3u8')">الجزيرة الرياضية (إخبارية)</div>
        <div class="chan-btn" onclick="changeSource('Sky News', 'https://skynewsau-live.akamaized.net/hls/live/2002689/skynewsau-extra1/master.m3u8')">سكاي نيوز (تجريبية)</div>
        
        <div class="chan-btn" onclick="changeSource('beIN Sports 1', 'رابط_بي_ان_1_هنا')">beIN Sports 1</div>
        <div class="chan-btn" onclick="changeSource('beIN Sports 2', 'رابط_بي_ان_2_هنا')">beIN Sports 2</div>
        <div class="chan-btn" onclick="changeSource('SSC Sport', 'رابط_ssc_هنا')">SSC Sport</div>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    var player = videojs('main-player');

    function changeSource(name, url) {
        if(url === 'رابط_بي_ان_1_هنا' || url === '') {
            alert('يا بطل، لازم تحط رابط m3u8 شغال لهذه القناة داخل الكود!');
            return;
        }
        
        // تغيير الرابط وتشغيل الفيديو
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play();
        
        // تحديث النص
        document.getElementById('current-status').innerText = "جاري التشغيل: " + name;
        
        // تغيير شكل الأزرار
        let btns = document.querySelectorAll('.chan-btn');
        btns.forEach(btn => btn.classList.remove('active-chan'));
        event.target.classList.add('active-chan');
    }
</script>

</body>
</html>
