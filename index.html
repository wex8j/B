<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ يلا مباريات HD</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:26px;
border-bottom:3px solid red;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.video-js{
width:100%!important;
height:450px!important;
}

.search{
width:100%;
padding:10px;
margin-top:15px;
border-radius:6px;
border:none;
}

.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:12px;
margin-top:20px;
}

.channel{
background:#161616;
padding:15px;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.channel:hover{
background:#222;
}

.live{
background:red;
padding:3px 8px;
border-radius:5px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

@media(max-width:768px){
.video-js{
height:250px!important;
}
}

</style>

</head>

<body>

<header>
⚽ يلا مباريات HD
</header>

<div class="container">

<video id="player" class="video-js" controls></video>

<input id="search" class="search" placeholder="ابحث عن قناة">

<div id="channels" class="channels"></div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

const player = videojs('player');

const playlist =
"https://iptv-org.github.io/iptv/categories/sports.m3u";

let channels=[];

fetch(playlist)
.then(res=>res.text())
.then(data=>{

const lines=data.split("\n");

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name=lines[i].split(",")[1];
let url=lines[i+1];

if(
name.toLowerCase().includes("sport") ||
name.includes("رياض") ||
name.includes("Kass") ||
name.includes("Abu") ||
name.includes("Dubai") ||
name.includes("Sharjah")
){

channels.push({
name:name,
url:url
});

}

}

}

showChannels(channels);

});


function showChannels(list){

const container=document.getElementById("channels");

container.innerHTML="";

list.forEach(ch=>{

let div=document.createElement("div");

div.className="channel";

div.innerHTML=`${ch.name}<br><span class="live">LIVE</span>`;

div.onclick=function(){

player.src({
src:ch.url,
type:"application/x-mpegURL"
});

player.play();

};

container.appendChild(div);

});

}


document.getElementById("search").addEventListener("input",function(){

let val=this.value.toLowerCase();

let filtered=channels.filter(c=>c.name.toLowerCase().includes(val));

showChannels(filtered);

});

</script>

</body>

</html>
